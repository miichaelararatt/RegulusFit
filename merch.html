<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Merch | RegulusFit</title>

  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-content">

      <h1>Merch Oficial RegulusFit</h1>

      <p>
        Lleva tu disciplina dentro y fuera del gimnasio.
      </p>

    </div>

  </section>

  <!-- PRODUCTOS -->
  <section class="merch-section">

    <div class="product-grid">

      <!-- PRODUCTO 1 -->
      <div class="product-card">

        <img src="images/camiseta.png"
        alt="Camiseta RegulusFit">

        <h3>Camiseta Oversize</h3>

        <p class="price">$89.900</p>



      </div>

      <!-- PRODUCTO 2 -->
      <div class="product-card">

        <img src="images/shaker.png"
        alt="Shaker RegulusFit">

        <h3>Shaker Premium</h3>

        <p class="price">$39.900</p>


      </div>

      <!-- PRODUCTO 3 -->
      <div class="product-card">

        <img src="images/guantes.png"
        alt="Guantes Gym">

        <h3>Guantes Fitness</h3>

        <p class="price">$59.900</p>


      </div>

      <!-- PRODUCTO 4 -->
      <div class="product-card">

        <img src="images/cinturon.png"
        alt="Cinturón Gym">

        <h3>Cinturón Lumbar</h3>

        <p class="price">$119.900</p>

      </div>

    </div>

  </section>

</body>
</html>
