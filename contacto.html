<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contacto | RegulusFit</title>

  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-content">

      <h1>Contáctanos</h1>

      <p>
        Síguenos en nuestras redes y únete a la comunidad RegulusFit.
      </p>

    </div>

  </section>

  <!-- CONTACTO -->
  <section class="contact-section">

    <div class="contact-card">

      <h2>Correo Electrónico</h2>

      <img src="images/gmail.png"
      alt="gmail"
      class="social-logo">

      <p>regulusfit@gmail.com</p>

    </div>

    <div class="contact-card">

      <h2>Instagram</h2>

      <!-- LOGO INSTAGRAM -->
      <img src="images/Instagram.png"
      alt="Instagram"
      class="social-logo">

      <p>@RegulusFit</p>

    </div>

    <div class="contact-card">

      <h2>TikTok</h2>

      <!-- LOGO TIKTOK -->
      <img src="images/tiktok.png"
      alt="TikTok"
      class="social-logo">

      <p>@RegulusFit</p>

    </div>

  </section>

</body>
</html>
